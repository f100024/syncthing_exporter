
name: Make release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: Create draft of release
        default: true
        type: boolean
        required: true
      build_dockerimage:
        description: Build docker images and push to docker hub
        default: true
        type: boolean
        required: true
  push:
    tags:
      - 'v*'

jobs:
  # build_release:
