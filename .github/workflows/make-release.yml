  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #     - name: Cache artifacts
  #       uses: actions/cache@v3
  #       with:
  #         path: .build
  #         key: syncthing_exporter-${{ github.sha }}

  build_dockerimage:
    # if: ${{ inputs.build_dockerimage }}
    needs: build_release
    name: Build docker images
    runs-on: ubuntu-22.04
    steps:

      - name: Checkout code
        uses: actions/checkout@v3.1.0

      - name: Set VERSION as environment variable
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Cache artifacts
        uses: actions/cache@v3
        with:
          path: .build
          key: syncthing_exporter-3c019ee5de64928c7cb8cd84b72402b1131c12e2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2.1.0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.2.1

      - name: Login to DockerHub
        uses: docker/login-action@v2.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
  
      - name: Build and push
        uses: docker/build-push-action@v3.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v6,linux/arm/v7
          push: true
          target: ghactions
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/syncthing_exporter:test,
            # ${{ secrets.DOCKERHUB_USERNAME }}/syncthing_exporter:${{ env.VERSION }}
        env:
          DOCKER_BUILDKIT: 1
